<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RENVA — Sign In</title>
  <meta name="description" content="RENVA Invoice & Revenue Management — Sign In" />
  <link rel="icon" type="image/png" href="renvafavicon.png" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { min-height: 100vh; display: flex; }

    .login-wrapper {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    .login-panel-left {
      flex: 1;
      background: linear-gradient(145deg, #0f172a 0%, #1e3a8a 50%, #1d4ed8 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }
    .login-panel-left::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(37,99,235,0.15);
      top: -150px; right: -150px;
    }
    .login-panel-left::after {
      content: '';
      position: absolute;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      bottom: -100px; left: -80px;
    }

    .brand-block { text-align: center; position: relative; z-index: 2; }
    .brand-icon {
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      backdrop-filter: blur(8px);
    }
    .brand-icon svg { width: 38px; height: 38px; color: #fff; }
    .brand-icon-img { width: 48px; height: 48px; object-fit: contain; }

    .brand-name {
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .brand-tagline {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
      letter-spacing: 0.03em;
      max-width: 280px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .brand-features {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 300px;
    }
    .brand-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      backdrop-filter: blur(4px);
    }
    .brand-feature-icon {
      width: 32px; height: 32px;
      background: rgba(37,99,235,0.5);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .brand-feature-icon svg { width: 16px; height: 16px; color: #fff; }
    .brand-feature-text {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .login-panel-right {
      width: 480px;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      padding: 40px 48px;
      position: relative;
    }

    .login-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .login-logo-icon {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-logo-icon svg { width: 18px; height: 18px; color: #fff; }
    .login-logo-img { width: 26px; height: 26px; object-fit: contain; }
    .login-logo-text {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.06em;
    }

    .login-form-container { flex: 1; display: flex; flex-direction: column; justify-content: center; }

    .login-heading    { font-size: 1.75rem; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .login-subheading { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 32px; }

    .login-error {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
      animation: fadeInUp 0.3s ease;
    }
    .login-error.show { display: block; }

    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap .form-input {
      padding-inline-start: 40px;
    }
    .input-icon {
      position: absolute;
      inset-inline-start: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }
    .input-icon svg { width: 16px; height: 16px; display: block; }

    .pw-toggle {
      position: absolute;
      inset-inline-end: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      padding: 4px;
      border-radius: 4px;
      transition: color var(--t-fast);
    }
    .pw-toggle:hover { color: var(--text-primary); }
    .pw-toggle svg   { width: 16px; height: 16px; }

    .login-options {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 24px;
    }
    .forgot-link {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--primary);
      cursor: pointer;
      background: none;
      border: none;
      transition: color var(--t-fast);
    }
    .forgot-link:hover { color: var(--primary-hover); }

    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-tertiary);
    }

    .terms-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      cursor: pointer;
      line-height: 1.45;
    }
    .terms-checkbox input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--primary);
      flex-shrink: 0;
    }
    .terms-checkbox a {
      color: var(--primary);
      text-decoration: underline;
    }

    .forgot-panel { display: none; animation: fadeInUp 0.35s ease both; }
    .forgot-panel.active { display: block; }
    .login-panel-main { animation: fadeInUp 0.35s ease both; }
    .login-panel-main.hidden { display: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 24px;
      padding: 4px 0;
      transition: color var(--t-fast);
    }
    .back-btn:hover { color: var(--primary); }
    .back-btn svg   { width: 15px; height: 15px; }

    @media (max-width: 900px) {
      .login-panel-left { display: none; }
      .login-panel-right { width: 100%; padding: 32px 24px; }
    }
    @media (max-width: 480px) {
      .login-panel-right { padding: 24px 20px; }
      .login-topbar { margin-bottom: 32px; }
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <div class="login-panel-left">
    <div class="brand-block">
      <div class="brand-icon">
        <img src="renvalogo.png" alt="RENVA" class="brand-icon-img" />
      </div>
      <div class="brand-name">RENVA</div>
      <div class="brand-tagline" data-i18n="brand.tagline">Invoice &amp; Revenue Management</div>

      <div class="brand-features">
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="brand-feature-text" data-i18n="brand.feature1">Real-time revenue tracking</div>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </div>
          <div class="brand-feature-text" data-i18n="brand.feature2">Professional invoicing</div>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div class="brand-feature-text" data-i18n="brand.feature3">Secure &amp; private data</div>
        </div>
      </div>
    </div>
  </div>

  <div class="login-panel-right">
    <div class="login-topbar">
      <a class="login-logo" href="#">
        <div class="login-logo-icon">
          <img src="renvalogo.png" alt="RENVA" class="login-logo-img" />
        </div>
        <span class="login-logo-text">RENVA</span>
      </a>

      <div style="display:flex;align-items:center;gap:8px;">
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="ar">ع</button>
        </div>
      </div>
    </div>

    <div class="login-form-container">

      <div class="login-panel-main" id="loginPanel">
        <h1 class="login-heading" data-i18n="auth.loginTitle">Welcome Back</h1>
        <p class="login-subheading" data-i18n="auth.loginSubtitle">Sign in to your RENVA account</p>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email" data-i18n="auth.email">Email Address</label>
            <div class="input-icon-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                data-i18n-placeholder="auth.email"
                placeholder="Email Address"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password" data-i18n="auth.password">Password</label>
            <div class="input-icon-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                data-i18n-placeholder="auth.password"
                placeholder="Password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1" aria-label="Show/hide password">
                <svg id="pwEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="pwEyeOff" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="login-options">
            <button type="button" class="forgot-link" id="showForgot" data-i18n="auth.forgotPassword">
              Forgot password?
            </button>
          </div>

          <label class="terms-checkbox" id="termsWrap">
            <input type="checkbox" id="agreeTerms" />
            <span><span data-i18n="auth.agreeTerms"></span> <a href="legal.html" target="_blank" data-i18n="auth.termsLink"></a></span>
          </label>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            <span data-i18n="auth.loginBtn">Sign In</span>
          </button>
        </form>
      </div>

      <div class="forgot-panel" id="forgotPanel">
        <button type="button" class="back-btn" id="backToLogin">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          <span data-i18n="auth.backToLogin">Back to Sign In</span>
        </button>

        <h1 class="login-heading" data-i18n="auth.resetTitle">Reset Password</h1>
        <p class="login-subheading" data-i18n="auth.resetSubtitle">We'll send you a reset link</p>

        <div id="resetMessage" class="form-message"></div>

        <form id="resetForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="resetEmail" data-i18n="auth.resetEmail">Email Address</label>
            <div class="input-icon-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input
                class="form-input"
                type="email"
                id="resetEmail"
                data-i18n-placeholder="auth.resetEmail"
                placeholder="Email Address"
                autocomplete="email"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="resetBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span data-i18n="auth.resetBtn">Send Reset Link</span>
          </button>
        </form>
      </div>

      <div class="login-footer">
        &copy; RENVA. Car Rental Invoice Management.
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script src="firebase.js?v=5"></script>
<script src="i18n.js"></script>
<script src="auth.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    RENVA_I18N.init();
    RENVA_AUTH.init();

    const pwInput  = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    const pwEye    = document.getElementById('pwEye');
    const pwEyeOff = document.getElementById('pwEyeOff');

    pwToggle?.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      pwEye?.classList.toggle('hidden', show);
      pwEyeOff?.classList.toggle('hidden', !show);
    });

    document.getElementById('agreeTerms')?.addEventListener('change', function () {
      document.getElementById('loginBtn').disabled = !this.checked;
    });

    document.getElementById('showForgot')?.addEventListener('click', () => {
      document.getElementById('loginPanel').classList.add('hidden');
      document.getElementById('forgotPanel').classList.add('active');
    });
    document.getElementById('backToLogin')?.addEventListener('click', () => {
      document.getElementById('forgotPanel').classList.remove('active');
      document.getElementById('loginPanel').classList.remove('hidden');
      document.getElementById('resetMessage').className = 'form-message';
      document.getElementById('resetMessage').textContent = '';
    });
  });
</script>
</body>
</html>
